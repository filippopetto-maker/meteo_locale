<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteo Roma</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
    #map { height: 100vh; width: 100vw; }

    #info-panel {
      position: absolute;
      bottom: 24px;
      left: 12px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 8px;
      padding: 10px 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      font-size: 13px;
    }
    #wind-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    #wind-toggle input { cursor: pointer; }

    /* Pannello info — top-left (iniettato da JS) */
    .info-panel {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-family: sans-serif;
      font-size: 13px;
      line-height: 1.6;
      pointer-events: auto;
    }
    .info-title { font-weight: bold; font-size: 14px; }
    .info-update { font-size: 11px; opacity: 0.8; }

    /* Toggle layer */
    .layer-toggle { margin-top: 8px; display: flex; gap: 6px; }
    .layer-toggle button {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border: none;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .layer-toggle button.active { background: rgba(255, 255, 255, 0.4); font-weight: bold; }

    /* Legenda — bottom-right (iniettata da JS, gradiente impostato da JS) */
    .temp-legend {
      position: fixed;
      bottom: 30px;
      right: 10px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-family: sans-serif;
      font-size: 12px;
      width: 160px;
    }
    .legend-title { font-weight: bold; margin-bottom: 4px; }
    .legend-bar { height: 12px; border-radius: 3px; margin-bottom: 3px; }
    .legend-labels { display: flex; justify-content: space-between; font-size: 11px; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="info-panel">
    <label id="wind-toggle">
      <input type="checkbox" id="wind-check" checked />
      Mostra vento
    </label>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-velocity@2.1.1/dist/leaflet-velocity.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
