name: export-static

on:
  workflow_dispatch:
  schedule:
    - cron: '15 * * * *'   # ogni ora a :15, sfasato dall'inference

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install supabase pandas numpy scipy python-dotenv requests matplotlib

      - name: Run export
        run: |
          for i in 1 2 3; do
            python3 scripts/export_static.py && break
            echo "Attempt $i failed, retrying in 20s..."
            sleep 20
          done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Commit and push static data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/ data/sst_cache.json
          git diff --staged --quiet || git commit -m "chore: update static data [skip ci]"
          git pull --rebase origin main
          git push

  export-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install supabase pandas numpy scipy python-dotenv requests matplotlib

      - name: Run dashboard export
        run: python3 scripts/export_static.py --dashboard-only
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Commit and push dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/dashboard_data.json
          git diff --staged --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git pull --rebase origin main
          git push
